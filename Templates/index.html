<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Counseling Portal - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="login-card p-4 p-md-5 shadow-lg rounded-3">
            <h2 class="text-center mb-4 app-title">Counseling Portal</h2>

            <form id="loginForm">
                <h5 class="mb-3 text-center">Student Login</h5>
                
                <div class="mb-3">
                    <label for="emailInput" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
                </div>
                
                <div class="mb-3">
                    <label for="passwordInput" class="form-label">Password</label>
                    <input type="password" class="form-control" id="passwordInput" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 mb-3">Log In</button>
                
                <p class="text-center mb-3">
                    <a href="signup.html" class="text-decoration-none">New Student? Sign Up Here</a>
                </p>

                <div class="divider-text mb-3">
                    <hr>
                    <span>OR</span>
                    <hr>
                </div>
            </form>

            <div class="social-login text-center">
                <button class="btn btn-outline-danger w-100 mb-2" onclick="handleSocialLogin('google')">
                    <i class="fab fa-google me-2"></i> Continue with Google
                </button>
                <button class="btn btn-outline-dark w-100" onclick="handleSocialLogin('github')">
                    <i class="fab fa-github me-2"></i> Continue with GitHub
                </button>
            </div>
            
            <hr>
            <p class="text-center mt-3">
                <a href="admin-login.html" class="text-decoration-none admin-link">Are you an Admin? Log In Here</a>
            </p>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/YOUR_KIT_CODE.js" crossorigin="anonymous"></script> 
    <script src="index.js"></script>
</body>
</html>
